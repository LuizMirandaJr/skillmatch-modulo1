<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Match</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
    <header>
        <nav>
            <img src="./assets/imgs/logo-escuro.png" class="logo" alt="logo skillmatch">
        </nav>
    </header>
    <main class="main-content">
        <div class="hero-titulos">
            <div class="hero-mensagem">
                <h1 class="hero-titulo">Encontre vagas que combinam <span class="span-txt">com você</span></h1>
                <p class="hero-texto">Informe seus dados e descubra as melhores oportunidades para o seu perfil.</p>
            </div>
            <img src="./assets/imgs/hero-img.png" alt="icone para skillmatch" class="hero-img">
        </div>
        <!-- FORMULÁRIO -->
        <form action="POST" class="formulario">
            <h2 id="titulo-h2" class="form-titulo"><i class="bi bi-person-circle"></i> Seus Dados</h2>
            <div class="form">
                <label for="nome">Nome</label>
                <input type="text" placeholder="Digite seu nome" id="nome">
            </div>
            <div class="form">
                <label for="idade">Idade</label>
                <input type="text" placeholder="Digite sua idade" id="idade">
        </div>
        <div class="form">
            <label for="experiencia">Tempo de experiência</label>
            <select name="experiencia" id="experiencia">
                <option value="1-2">1-2 anos</option>
                <option value="3-5">3-5 anos</option>
                <option value="+5">+5 anos</option>
            </select>
        </div>
        <div class="form form-habilidades">
            <h2 id="titulo-h2"><i class="bi bi-code-slash"></i> Suas Habilidades</h2>
            <div class="habilidades">
                <span class="tag">JavaScript <i class="bi bi-x-circle-fill"></i></span>
            </div>
            <input type="text" name="javascript" id="javascript" placeholder="Digite uma habilidade">
        </div>
        <button type="button" id="btn-id" class="btn btn-primary btn-lg btn-block">Encontrar vagas <i class="bi bi-search"></i></button>
        </form>
        <!-- RESULTADO VAGAS -->
        <div class="vagas-titulos">
            <h2 id="titulo-h2"><i class="bi bi-stars"></i> Vagas para você</h2>
            <p class="vagas-texto">Baseado no seu perfil</p>
        </div>
        <div class="cards">
            <img src="https://images.vexels.com/media/users/3/135200/isolated/preview/6e34bca5f7091d42d242da24333ef273-icone-de-circulo-do-botao-de-ordem-aleatoria.png" alt="">
            <div class="card-infos">
                <p class="empresa">Tech Solutions</p>
                <h3 class="nome-vaga">Desenvolvedor Front-End</h3>
                <div class="modelo-salario">
                    <span class="modelo">Remoto</span>
                    <span class="salario">R$ 6.500</span>
                </div>
            </div>
            <div class="compatibilidade">
                <p class="comp-texto">Compatibilidade</p>
                <h2 class="porcentagem">92%</h2>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./assets/main.js" ></script>
</body>
</html>
