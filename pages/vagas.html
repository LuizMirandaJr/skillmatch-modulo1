<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Match</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="../assets/styles/style-page-vagas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <img src="../assets/imgs/logo-escuro.png" class="logo" alt="logo skillmatch">
            <div class="menu">
                <div class="hover-underline">
                    <a href="./index.html">Minhas Vagas</a>
                </div>
                <div class="hover-underline">
                    <a href="./criar.html">Criar Vaga</a>
                </div>
                <div class="hover-underline">
                    <a href="./vagas.html">Todas as Vagas</a>
                </div>
            </div>
            <span class="borda"></span>
        </nav>
    </header>
    <main class="main-content">
        <section id="vaga-geral" class="vagas hidden">
            <div class="vagas-titulos">
                <h2 id="titulo-h2"><i class="bi bi-stars icon-title"></i> Acompanhe todas as vagas disponíveis</h2>
                <!-- <p class="vagas-texto">Todas as vagas baseadas no seu perfil</p> -->
            </div>
            <div class="job-cards">
                <div class="job-card-sup">
                    <div class="job-card-img">
                        <div class="logo-vaga">
                            <img src="https://images.vexels.com/media/users/3/135200/isolated/preview/6e34bca5f7091d42d242da24333ef273-icone-de-circulo-do-botao-de-ordem-aleatoria.png"
                                alt="">
                        </div>
                    </div>
                    <div class="job-infos">
                        <p class="empresa">Tech Solutions</p>
                        <h3 class="nome-vaga">Desenvolvedor Front-End</h3>
                        <div class="modelo-salario">
                            <span class="tag-vaga bg-modelo">Remoto</span>
                            <span class="tag-vaga bg-salario">R$ 6.500</span>
                            <span class="tag-vaga bg-modalidade">PJ</span>
                        </div>
                    </div>
                </div>
                <div class="compatibilidade">
                    <p class="comp-texto">Compatibilidade</p>
                    <div class="w3-round barra-bg barra">
                        <div class="w3-container w3-round barra-cor barra-txt" style="width:25%">25%</div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./assets/scripts/main.js"></script>
</body>

</html>
